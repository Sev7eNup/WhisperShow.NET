name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore Voxwright.slnx
      - name: Build
        run: dotnet build Voxwright.slnx --no-restore
      - name: Test
        run: dotnet test tests/Voxwright.Tests --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/**/coverage.cobertura.xml
          retention-days: 30

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore WriteSpeech.slnx
      - name: Build
        run: dotnet build WriteSpeech.slnx --no-restore
      - name: Test
        run: dotnet test tests/WriteSpeech.Tests --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/**/coverage.cobertura.xml
          retention-days: 30

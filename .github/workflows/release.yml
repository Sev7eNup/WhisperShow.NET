name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test tests/WriteSpeech.Tests --verbosity normal

      - name: Publish application
        run: >
          dotnet publish src/WriteSpeech.App/WriteSpeech.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          /p:Version=${{ steps.version.outputs.version }}
          /p:PublishSingleFile=false
          /p:PublishTrimmed=false
          /p:DebugType=none
          /p:DebugSymbols=false

      - name: Verify no API keys in published config
        shell: bash
        run: |
          python3 -c "
          import json, sys, os
          files_to_check = ['publish/appsettings.template.json', 'publish/appsettings.json']
          leaked = []
          for path in files_to_check:
              if not os.path.exists(path):
                  continue
              with open(path) as f:
                  data = json.load(f)
              ws = data.get('WriteSpeech', {})
              keys_to_check = [
                  ('OpenAI.ApiKey', ws.get('OpenAI', {}).get('ApiKey', '')),
                  ('TextCorrection.Anthropic.ApiKey', ws.get('TextCorrection', {}).get('Anthropic', {}).get('ApiKey', '')),
                  ('TextCorrection.Google.ApiKey', ws.get('TextCorrection', {}).get('Google', {}).get('ApiKey', '')),
                  ('TextCorrection.Groq.ApiKey', ws.get('TextCorrection', {}).get('Groq', {}).get('ApiKey', '')),
              ]
              for name, val in keys_to_check:
                  if val and val != 'null':
                      leaked.append(f'{path}: {name}')
          if leaked:
              for item in leaked:
                  print(f'::error::Published config contains non-empty API key: {item}')
              sys.exit(1)
          print('All API key fields are empty — OK')
          "

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: cmd
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: >
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\WriteSpeech.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WriteSpeech ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            output/WriteSpeech-Setup-${{ steps.version.outputs.version }}.exe
